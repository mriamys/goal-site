name: Deploy Goal Site

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy Frontend and Backend via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            # Переходим в корень проекта и забираем свежий код
            cd /root/goal-site
            git pull origin main
            
            # 1. Обновление Клиента (Фронтенд)
            cd /root/goal-site/client
            npm install
            npm run build
            cp -r dist/* /var/www/goal-site-client/
            
            # 2. Обновление Сервера (Бэкенд)
            cd /root/goal-site/server
            npm install
            systemctl restart goal-site
